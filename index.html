<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess AI & Editor</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { background-color: #0f172a; color: white; font-family: system-ui, sans-serif; }
        
        .board-wrapper {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        #myBoard { 
            width: 100%; 
            border: 4px solid #334155;
        }

        /* --- THE FINAL HORIZONTAL FIX --- */
        /* We force the containers to be flex rows and ignore the library's default stacking */
        .spare-pieces-74527 {
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-between !important;
            align-items: center !important;
            background: #1e293b !important;
            padding: 10px !important;
            height: 65px !important;
            width: 100% !important;
            box-sizing: border-box !important;
            border-left: 4px solid #334155 !important;
            border-right: 4px solid #334155 !important;
            overflow: hidden !important;
        }

        /* Top tray specific */
        .spare-pieces-top-402ef {
            border-top: 4px solid #334155 !important;
            border-top-left-radius: 8px !important;
            border-top-right-radius: 8px !important;
        }

        /* Bottom tray specific */
        .spare-pieces-bottom-ae33f {
            border-bottom: 4px solid #334155 !important;
            border-bottom-left-radius: 8px !important;
            border-bottom-right-radius: 8px !important;
        }

        /* Fix individual pieces to stay in line */
        .spare-piece-af5f1 {
            position: relative !important;
            float: none !important;
            width: 14% !important; /* Spreads 6 pieces across 100% width */
            height: auto !important;
            display: block !important;
        }

        .chessboard-63f59 img {
            display: block !important;
            width: 100% !important;
        }

        /* Ensure the status bar stays at the bottom */
        .status-container {
            clear: both;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="max-w-6xl w-full flex flex-col lg:flex-row gap-10 items-center lg:items-start">
        
        <div class="board-wrapper">
            <div id="myBoard"></div>
            
            <div class="status-container p-4 bg-slate-800 rounded-lg border border-slate-700 text-center shadow-lg">
                <span class="text-slate-400 font-mono text-xs uppercase">Game Status:</span>
                <span id="status" class="text-indigo-400 font-bold ml-2 text-lg">Ready</span>
            </div>
        </div>

        <div class="w-full lg:w-80 space-y-6">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-2xl">
                <h1 class="text-xl font-black mb-4 border-b border-slate-700 pb-2 text-indigo-400 uppercase tracking-tighter">AI Board Editor</h1>
                
                <div class="space-y-3">
                    <button id="startBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-lg font-bold transition active:scale-95 text-white">Start AI Game</button>
                    <button id="resetBtn" class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-semibold transition text-white">Standard Start</button>
                    <button id="clearBtn" class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-semibold transition text-white">Clear Board</button>
                </div>

                <div class="mt-6">
                    <label class="text-xs font-bold text-slate-500 uppercase">AI Difficulty</label>
                    <select id="difficulty" class="w-full mt-2 bg-slate-900 border border-slate-600 p-2 rounded text-white cursor-pointer outline-none">
                        <option value="2">Level 1: Fast</option>
                        <option value="3" selected>Level 2: Normal</option>
                        <option value="4">Level 3: Strategic</option>
                    </select>
                </div>
            </div>

            <div class="bg-slate-900/50 p-4 rounded-lg border border-slate-700 text-[11px] text-slate-400 leading-relaxed">
                <p class="font-bold text-slate-300 mb-1">EDITOR MODE:</p>
                Drag the pieces from the horizontal rows into the board to set a position. 
                Click <span class="text-indigo-400">Start AI Game</span> to begin analysis.
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var isGameRunning = false;

        // Simple evaluation weights
        var weights = { p: 10, r: 50, n: 30, b: 30, q: 90, k: 900 };

        function makeBestMove() {
            if (game.game_over()) return;
            var moves = game.moves();
            if (moves.length === 0) return;

            var depth = parseInt($('#difficulty').val());
            var bestMove = moves[Math.floor(Math.random() * moves.length)];
            var bestValue = -9999;

            for(var i = 0; i < moves.length; i++) {
                game.move(moves[i]);
                var boardValue = -evaluateBoard(game.board());
                game.undo();
                if(boardValue > bestValue) {
                    bestValue = boardValue;
                    bestMove = moves[i];
                }
            }

            game.move(bestMove);
            board.position(game.fen());
            updateStatus();
        }

        function evaluateBoard(board) {
            var total = 0;
            for (var i = 0; i < 8; i++) {
                for (var j = 0; j < 8; j++) {
                    var piece = board[i][j];
                    if (piece) {
                        var val = weights[piece.type];
                        total += (piece.color === 'w' ? val : -val);
                    }
                }
            }
            return total;
        }

        function onDragStart (source, piece) {
            if (game.game_over()) return false;
        }

        function onDrop (source, target) {
            if (!isGameRunning) return;
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
            window.setTimeout(makeBestMove, 250);
        }

        function updateStatus () {
            var turn = (game.turn() === 'b') ? 'Black' : 'White';
            if (game.in_checkmate()) $status.html('CHECKMATE - ' + turn.toUpperCase() + ' LOSES');
            else if (game.in_draw()) $status.html('DRAW GAME');
            else $status.html(turn + ' to move');
        }

        // Button Click Handlers
        $('#startBtn').on('click', function() {
            var pos = board.fen();
            var valid = game.load(pos + " w KQkq - 0 1");
            if (!valid) {
                alert("Invalid position! Make sure both kings are on the board.");
                return;
            }
            isGameRunning = true;
            updateStatus();
        });

        $('#resetBtn').on('click', function() {
            game.reset();
            board.start();
            isGameRunning = false;
            $status.html('Ready');
        });

        $('#clearBtn').on('click', function() {
            game.clear();
            board.clear();
            isGameRunning = false;
            $status.html('Board Cleared');
        });

        function pieceTheme (piece) {
            return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + piece + '.png';
        }

        var config = {
            draggable: true,
            dropOffBoard: 'trash',
            sparePieces: true,
            position: 'start',
            pieceTheme: pieceTheme,
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: function() { board.position(game.fen()); }
        };
        board = Chessboard('myBoard', config);

        // Final cleanup to ensure layout is perfect
        window.onload = function() {
            board.resize();
        };
    </script>
</body>
</html>
