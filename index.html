<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess.com Style Analysis Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .editor-container { display: flex; gap: 15px; margin: 0 auto; align-items: flex-start; }
        .vertical-tray { display: flex; flex-direction: column; gap: 8px; padding: 12px; background: #1e293b; border: 2px solid #334155; border-radius: 8px; }
        .tray-piece { width: 45px; height: 45px; cursor: grab; }
        #myBoard { width: 500px; border: 4px solid #334155; position: relative; }

        /* Official Icon Placement */
        .move-feedback-icon {
            position: absolute;
            z-index: 100;
            width: 34px;
            height: 34px;
            top: -10px;
            right: -10px;
            pointer-events: none;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        [class^="spare-pieces"] { display: none !important; }
    </style>
</head>
<body class="p-10 flex justify-center">
    <div class="flex flex-col lg:flex-row gap-10">
        <div class="editor-container">
            <div class="vertical-tray" id="blackTray"></div>
            <div>
                <div id="myBoard"></div>
                <div class="mt-4 p-4 bg-slate-800 rounded border border-slate-700 text-center">
                    <span id="status" class="text-indigo-400 font-bold uppercase tracking-widest">Ready</span>
                </div>
            </div>
            <div class="vertical-tray" id="whiteTray"></div>
        </div>
        <div class="w-80 bg-slate-800 p-6 rounded-xl border border-slate-700">
            <h1 class="text-xl font-black mb-6 text-indigo-400">CHESS ANALYSIS</h1>
            <button id="startBtn" class="w-full bg-indigo-600 py-3 rounded mb-2 font-bold hover:bg-indigo-500">START GAME</button>
            <button id="resetBtn" class="w-full bg-slate-700 py-3 rounded mb-2 font-semibold">RESET</button>
            <button id="clearBtn" class="w-full bg-slate-700 py-3 rounded mb-6 font-semibold">CLEAR</button>
            <label class="text-xs font-bold text-slate-500 uppercase">Engine Depth</label>
            <select id="difficulty" class="w-full mt-2 bg-slate-900 border border-slate-600 p-3 rounded text-white">
                <option value="3">Level 1 (Fast)</option>
                <option value="4" selected>Level 2 (Standard)</option>
                <option value="5">Level 3 (Deep)</option>
            </select>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script>
        var board = null, game = new Chess(), isGameRunning = false;
        var aiWorker = new Worker('worker.js');

        // Official Chess.com SVG assets
        const iconAssets = {
            'brilliant': 'https://www.chess.com/node/amp/move-tier-icons/brilliant',
            'greatmove': 'https://www.chess.com/node/amp/move-tier-icons/greatmove',
            'bestmove': 'https://www.chess.com/node/amp/move-tier-icons/bestmove',
            'excellent': 'https://www.chess.com/node/amp/move-tier-icons/excellent',
            'good': 'https://www.chess.com/node/amp/move-tier-icons/good',
            'book': 'https://www.chess.com/node/amp/move-tier-icons/book',
            'inaccuracy': 'https://www.chess.com/node/amp/move-tier-icons/inaccuracy',
            'mistake': 'https://www.chess.com/node/amp/move-tier-icons/mistake',
            'miss': 'https://www.chess.com/node/amp/move-tier-icons/miss',
            'blunder': 'https://www.chess.com/node/amp/move-tier-icons/blunder'
        };

        function applyFeedback(square, type) {
            $('.move-feedback-icon').remove();
            const url = iconAssets[type];
            if (url) {
                $('#myBoard .square-' + square).append(`<img src="${url}" class="move-feedback-icon" alt="${type}">`);
            }
        }

        aiWorker.onmessage = function(e) {
            if (e.data.type === 'feedback') {
                applyFeedback(e.data.square, e.data.rating);
            } else if (e.data.type === 'move') {
                game.move(e.data.move);
                board.position(game.fen());
                $('#status').text(game.turn() === 'w' ? "White to move" : "Black to move");
            }
        };

        function onDrop(source, target) {
            if (!isGameRunning) return;
            const fenBefore = game.fen();
            const move = game.move({ from: source, to: target, promotion: 'q' });
            if (!move) return 'snapback';
            
            $('#status').text("Thinking...");
            aiWorker.postMessage({ 
                type: 'analyze', 
                fenBefore: fenBefore, 
                fenAfter: game.fen(), 
                move: move, 
                depth: $('#difficulty').val() 
            });
        }

        ['k','q','r','b','n','p'].forEach(p => {
            $('#blackTray').append(`<img src="https://chessboardjs.com/img/chesspieces/wikipedia/b${p.toUpperCase()}.png" class="tray-piece" data-piece="b${p.toUpperCase()}">`);
            $('#whiteTray').append(`<img src="https://chessboardjs.com/img/chesspieces/wikipedia/w${p.toUpperCase()}.png" class="tray-piece" data-piece="w${p.toUpperCase()}">`);
        });

        $(document).on('mousedown', '.tray-piece', function() { if(!isGameRunning) board.addSparePiece($(this).data('piece')); });
        $('#startBtn').click(() => { if(game.load(board.fen() + " w KQkq - 0 1")) isGameRunning = true; });
        $('#resetBtn').click(() => { game.reset(); board.start(); isGameRunning = false; $('.move-feedback-icon').remove(); });
        $('#clearBtn').click(() => { game.clear(); board.clear(); isGameRunning = false; $('.move-feedback-icon').remove(); });

        board = Chessboard('myBoard', { draggable: true, dropOffBoard: 'trash', position: 'start', onDrop: onDrop, pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png' });
    </script>
</body>
</html>
