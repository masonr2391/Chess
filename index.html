<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess AI & Editor</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { background-color: #0f172a; color: white; font-family: system-ui, -apple-system, sans-serif; }
        #myBoard { 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto;
            border: 5px solid #1e293b; 
            border-radius: 4px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        /* This ensures the pieces are visible and fit correctly */
        .chessboard-63f59 img {
            display: block !important;
            width: 100% !important;
            height: auto !important;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex flex-col items-center">

    <div class="max-w-6xl w-full flex flex-col lg:flex-row gap-10">
        
        <div class="flex-1">
            <div id="myBoard"></div>
            <div class="mt-6 p-4 bg-slate-800 rounded-lg border border-slate-700 text-center">
                <span class="text-slate-400 font-mono text-sm uppercase">Status:</span>
                <span id="status" class="text-indigo-400 font-bold ml-2">Ready to Play</span>
            </div>
        </div>

        <div class="w-full lg:w-80 space-y-6">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
                <h1 class="text-xl font-black mb-4 border-b border-slate-700 pb-2">CHESS AI EDITOR</h1>
                
                <div class="space-y-3">
                    <button id="startBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-lg font-bold transition shadow-lg active:scale-95">Start AI Game</button>
                    <button id="resetBtn" class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-semibold transition">Standard Start</button>
                    <button id="clearBtn" class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-semibold transition">Clear Board</button>
                </div>

                <div class="mt-6">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Difficulty</label>
                    <select id="difficulty" class="w-full mt-2 bg-slate-900 border border-slate-600 p-2 rounded text-white outline-none">
                        <option value="2">Easy</option>
                        <option value="3" selected>Medium</option>
                        <option value="4">Hard</option>
                    </select>
                </div>
            </div>

            <div class="bg-indigo-900/20 p-4 rounded-lg border border-indigo-500/30 text-xs text-indigo-300 leading-relaxed">
                <p><strong>Instructions:</strong> Use the "spare pieces" (the pieces appearing outside the board) to drag and drop them onto the squares. Once you've set up your position, click <strong>Start AI Game</strong>.</p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var isGameRunning = false;

        // --- AI STUFF ---
        var weights = { p: 10, r: 50, n: 30, b: 30, q: 90, k: 900 };

        function makeBestMove() {
            if (game.game_over()) return;
            var depth = parseInt($('#difficulty').val());
            var moves = game.moves();
            var bestMove = moves[Math.floor(Math.random() * moves.length)]; // Fallback
            
            // Simple logic to pick a move
            var bestValue = -9999;
            for(var i = 0; i < moves.length; i++) {
                game.move(moves[i]);
                var boardValue = -evaluateBoard(game.board());
                game.undo();
                if(boardValue > bestValue) {
                    bestValue = boardValue;
                    bestMove = moves[i];
                }
            }

            game.move(bestMove);
            board.position(game.fen());
            updateStatus();
        }

        function evaluateBoard(board) {
            var total = 0;
            for (var i = 0; i < 8; i++) {
                for (var j = 0; j < 8; j++) {
                    var piece = board[i][j];
                    if (piece) {
                        var val = weights[piece.type];
                        total += (piece.color === 'w' ? val : -val);
                    }
                }
            }
            return total;
        }

        // --- BOARD EVENTS ---
        function onDragStart (source, piece) {
            if (game.game_over()) return false;
        }

        function onDrop (source, target) {
            if (!isGameRunning) return;
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
            window.setTimeout(makeBestMove, 250);
        }

        function updateStatus () {
            var turn = (game.turn() === 'b') ? 'Black' : 'White';
            if (game.in_checkmate()) $status.html('Checkmate! ' + turn + ' loses.');
            else if (game.in_draw()) $status.html('Draw!');
            else $status.html(turn + ' to move');
        }

        // --- BUTTON ACTIONS ---
        $('#startBtn').on('click', function() {
            var pos = board.fen();
            // We assume white starts the setup
            var valid = game.load(pos + " w KQkq - 0 1");
            if (!valid) {
                alert("The board setup is invalid (missing kings?)");
                return;
            }
            isGameRunning = true;
            updateStatus();
        });

        $('#resetBtn').on('click', function() {
            game.reset();
            board.start();
            isGameRunning = false;
            $status.html('Ready');
        });

        $('#clearBtn').on('click', function() {
            game.clear();
            board.clear();
            isGameRunning = false;
            $status.html('Board Cleared');
        });

        // --- THE FIX FOR IMAGES ---
        // We use the most stable URL for chess pieces available
        function pieceTheme (piece) {
            return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + piece + '.png';
        }

        var config = {
            draggable: true,
            dropOffBoard: 'trash',
            sparePieces: true,
            position: 'start',
            pieceTheme: pieceTheme, // Using the function to be safe
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: function() { board.position(game.fen()); }
        };
        board = Chessboard('myBoard', config);
        
        // Final fix: Refresh the board after a second to make sure images load
        window.onload = function() {
            board.resize();
        };
    </script>
</body>
</html>
