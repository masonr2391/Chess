<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess AI & Editor</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { background-color: #0f172a; color: white; font-family: system-ui, sans-serif; }
        
        /* Layout container for board + vertical pieces */
        .editor-container {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 10px;
            margin: 0 auto;
        }

        /* Vertical Trays */
        .vertical-tray {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 4px;
        }

        .tray-piece {
            width: 40px;
            height: 40px;
            cursor: grab;
            transition: transform 0.1s;
        }

        .tray-piece:active { cursor: grabbing; transform: scale(1.1); }

        #myBoard { 
            width: 500px; 
            border: 4px solid #334155;
            border-radius: 4px;
        }

        /* Kill all library spare piece logic */
        [class^="spare-pieces"] {
            display: none !important;
            height: 0 !important;
            visibility: hidden !important;
        }

        .status-area {
            width: 100%;
            max-width: 500px;
            background: #1e293b;
            padding: 12px;
            margin-top: 15px;
            border-radius: 6px;
            border: 1px solid #334155;
            text-align: center;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex justify-center">

    <div class="flex flex-col lg:flex-row gap-10 items-start">
        
        <div class="flex flex-col items-center">
            <div class="editor-container">
                <div class="vertical-tray">
                    <img src="https://chessboardjs.com/img/chesspieces/wikipedia/bK.png" class="tray-piece" data-piece="bK">
                    <img src="https://chessboardjs.com/img/chesspieces/wikipedia/bQ.png" class="tray-piece" data-piece="bQ">
                    <img src="https://chessboardjs.com/img/chesspieces/wikipedia/bR.png" class="tray-piece" data-piece="bR">
                    <img src="https://chessboardjs.com/img/chesspieces/wikipedia/bB.png" class="tray-piece" data-piece="bB">
                    <img src="https://chessboardjs.com/img/chesspieces/wikipedia/bN.png" class="tray-piece" data-piece="bN">
                    <img src="https://chessboardjs.com/img/chesspieces/wikipedia/bP.png" class="tray-piece" data-piece="bP">
                </div>

                <div id="myBoard"></div>

                <div class="vertical-tray">
                    <img src="https://chessboardjs.com/img/chesspieces/wikipedia/wK.png" class="tray-piece" data-piece="wK">
                    <img src="https://chessboardjs.com/img/chesspieces/wikipedia/wQ.png" class="tray-piece" data-piece="wQ">
                    <img src="https://chessboardjs.com/img/chesspieces/wikipedia/wR.png" class="tray-piece" data-piece="wR">
                    <img src="https://chessboardjs.com/img/chesspieces/wikipedia/wB.png" class="tray-piece" data-piece="wB">
                    <img src="https://chessboardjs.com/img/chesspieces/wikipedia/wN.png" class="tray-piece" data-piece="wN">
                    <img src="https://chessboardjs.com/img/chesspieces/wikipedia/wP.png" class="tray-piece" data-piece="wP">
                </div>
            </div>

            <div class="status-area">
                <span class="text-slate-500 font-mono text-xs uppercase uppercase">Game Status:</span>
                <span id="status" class="text-indigo-400 font-bold ml-2">Ready</span>
            </div>
        </div>

        <div class="w-80 space-y-6">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-2xl">
                <h1 class="text-xl font-black mb-6 text-indigo-400 border-b border-slate-700 pb-2">AI BOARD EDITOR</h1>
                
                <div class="space-y-4">
                    <button id="startBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-lg font-bold transition active:scale-95">START AI GAME</button>
                    <button id="resetBtn" class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-semibold">STANDARD START</button>
                    <button id="clearBtn" class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-semibold">CLEAR BOARD</button>
                </div>

                <div class="mt-8">
                    <label class="text-xs font-bold text-slate-500 uppercase">AI Difficulty</label>
                    <select id="difficulty" class="w-full mt-2 bg-slate-900 border border-slate-600 p-3 rounded-lg text-white outline-none">
                        <option value="2">Level 1</option>
                        <option value="3" selected>Level 2</option>
                        <option value="4">Level 3</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var isGameRunning = false;

        var weights = { p: 10, r: 50, n: 30, b: 30, q: 90, k: 900 };

        function makeBestMove() {
            if (game.game_over()) return;
            var moves = game.moves();
            if (moves.length === 0) return;
            var depth = parseInt($('#difficulty').val());
            var bestMove = moves[Math.floor(Math.random() * moves.length)];
            var bestValue = -9999;
            for(var i = 0; i < moves.length; i++) {
                game.move(moves[i]);
                var val = -evaluateBoard(game.board());
                game.undo();
                if(val > bestValue) { bestValue = val; bestMove = moves[i]; }
            }
            game.move(bestMove);
            board.position(game.fen());
            updateStatus();
        }

        function evaluateBoard(board) {
            var total = 0;
            for (var i = 0; i < 8; i++) {
                for (var j = 0; j < 8; j++) {
                    var piece = board[i][j];
                    if (piece) {
                        var val = weights[piece.type];
                        total += (piece.color === 'w' ? val : -val);
                    }
                }
            }
            return total;
        }

        function onDrop (source, target) {
            if (!isGameRunning) return;
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
            window.setTimeout(makeBestMove, 250);
        }

        function updateStatus () {
            var turn = (game.turn() === 'b') ? 'Black' : 'White';
            if (game.in_checkmate()) $status.html('CHECKMATE - ' + turn.toUpperCase() + ' LOSES');
            else if (game.in_draw()) $status.html('DRAW');
            else $status.html(turn + ' to move');
        }

        $('#startBtn').on('click', function() {
            var valid = game.load(board.fen() + " w KQkq - 0 1");
            if (!valid) { alert("Add both kings!"); return; }
            isGameRunning = true;
            updateStatus();
        });

        $('#resetBtn').on('click', function() { game.reset(); board.start(); isGameRunning = false; $status.html('Ready'); });
        $('#clearBtn').on('click', function() { game.clear(); board.clear(); isGameRunning = false; $status.html('Cleared'); });

        // Manually handle tray pieces
        $(document).on('mousedown', '.tray-piece', function() {
            if (!isGameRunning) board.addSparePiece($(this).attr('data-piece'));
        });

        board = Chessboard('myBoard', {
            draggable: true,
            dropOffBoard: 'trash',
            sparePieces: false,
            position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: onDrop,
            onSnapEnd: function() { board.position(game.fen()); }
        });
    </script>
</body>
</html>
