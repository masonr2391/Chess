<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess AI & Editor</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .board-container { max-width: 550px; width: 100%; }
        #myBoard { width: 100%; border: 4px solid #334155; border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        /* Fix for piece images sometimes being too large */
        .chessboard-63f59 img { width: 100%; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="flex flex-col lg:flex-row gap-8 w-full max-w-5xl items-start">
        
        <div class="board-container mx-auto lg:mx-0">
            <div id="myBoard"></div>
            <div class="mt-4 p-4 bg-slate-800 rounded-lg border border-slate-700">
                <p class="text-sm font-mono">Status: <span id="status" class="text-emerald-400 font-bold">Ready</span></p>
            </div>
        </div>

        <div class="w-full lg:w-96 bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-2xl space-y-6">
            <div>
                <h1 class="text-2xl font-bold text-white">Chess AI Control</h1>
                <p class="text-slate-400 text-xs mt-1 italic">Single-File Web App</p>
            </div>
            
            <div class="space-y-3">
                <label class="text-xs font-black text-slate-500 uppercase tracking-widest">Game Controls</label>
                <button id="startBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-lg font-bold transition-all transform active:scale-95 shadow-lg">Start AI Game</button>
                <button id="resetBtn" class="w-full bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-lg font-semibold transition-all">Reset Board</button>
                <button id="clearBtn" class="w-full bg-rose-900/40 hover:bg-rose-800 text-rose-200 py-3 rounded-lg font-semibold border border-rose-800/50 transition-all">Clear Board</button>
            </div>

            <div class="space-y-3">
                <label class="text-xs font-black text-slate-500 uppercase tracking-widest">AI Intelligence</label>
                <select id="difficulty" class="w-full bg-slate-900 text-white p-3 rounded-lg border border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer">
                    <option value="2">Level 1: Fast & Simple</option>
                    <option value="3" selected>Level 2: Balanced</option>
                    <option value="4">Level 3: Strategic (Slow)</option>
                </select>
            </div>

            <div class="bg-slate-900/50 p-4 rounded-lg border border-slate-700/50">
                <h3 class="text-xs font-bold text-slate-400 mb-2">HOW TO USE:</h3>
                <ul class="text-[11px] text-slate-500 space-y-2 list-disc pl-4">
                    <li>Drag pieces from the <span class="text-slate-300">spare pool</span> to set up a puzzle.</li>
                    <li>Drag pieces to the <span class="text-slate-300">trash</span> to remove them.</li>
                    <li>Press <span class="text-indigo-400">Start AI Game</span> when you're ready to play!</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        // --- BASIC SETUP ---
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var isGameRunning = false;

        // Piece weights for the AI to judge the board
        var weights = { p: 10, r: 50, n: 30, b: 30, q: 90, k: 900 };

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
        }

        function onDrop (source, target) {
            if (!isGameRunning) return;

            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            updateStatus();
            window.setTimeout(makeBestMove, 250);
        }

        // --- AI LOGIC (MINIMAX) ---
        function makeBestMove() {
            if (game.game_over()) return;

            var depth = parseInt($('#difficulty').val());
            var move = minimaxRoot(depth, game, true);
            game.move(move);
            board.position(game.fen());
            updateStatus();
        }

        function minimaxRoot(depth, game, isMaximizing) {
            var moves = game.moves();
            var bestValue = -9999;
            var bestMoveFound;

            for(var i = 0; i < moves.length; i++) {
                game.move(moves[i]);
                var value = minimax(depth - 1, game, -10000, 10000, !isMaximizing);
                game.undo();
                if(value >= bestValue) {
                    bestValue = value;
                    bestMoveFound = moves[i];
                }
            }
            return bestMoveFound;
        }

        function minimax(depth, game, alpha, beta, isMaximizing) {
            if (depth === 0) return -evaluateBoard(game.board());
            var moves = game.moves();

            if (isMaximizing) {
                var bestValue = -9999;
                for (var i = 0; i < moves.length; i++) {
                    game.move(moves[i]);
                    bestValue = Math.max(bestValue, minimax(depth - 1, game, alpha, beta, !isMaximizing));
                    game.undo();
                    alpha = Math.max(alpha, bestValue);
                    if (beta <= alpha) return bestValue;
                }
                return bestValue;
            } else {
                var bestValue = 9999;
                for (var i = 0; i < moves.length; i++) {
                    game.move(moves[i]);
                    bestValue = Math.min(bestValue, minimax(depth - 1, game, alpha, beta, !isMaximizing));
                    game.undo();
                    beta = Math.min(beta, bestValue);
                    if (beta <= alpha) return bestValue;
                }
                return bestValue;
            }
        }

        function evaluateBoard(board) {
            var total = 0;
            for (var i = 0; i < 8; i++) {
                for (var j = 0; j < 8; j++) {
                    var piece = board[i][j];
                    if (piece) {
                        var val = weights[piece.type];
                        total += (piece.color === 'w' ? val : -val);
                    }
                }
            }
            return total;
        }

        // --- UI UPDATES ---
        function updateStatus () {
            var status = '';
            var turn = (game.turn() === 'b') ? 'Black' : 'White';

            if (game.in_checkmate()) status = 'Checkmate! ' + turn + ' loses.';
            else if (game.in_draw()) status = 'Draw game.';
            else {
                status = turn + ' to move';
                if (game.in_check()) status += ' (Check!)';
            }
            $status.html(status);
        }

        // --- BUTTONS ---
        $('#startBtn').on('click', function() {
            var currentPos = board.fen();
            // This initializes the game logic with the current board layout
            var setup = game.load(currentPos + " w KQkq - 0 1");
            if (!setup) {
                alert("Invalid board setup! Make sure both kings are on the board.");
                return;
            }
            isGameRunning = true;
            updateStatus();
            $status.append(" - AI Active");
        });

        $('#resetBtn').on('click', function() {
            game.reset();
            board.start();
            isGameRunning = false;
            $status.html('Ready');
        });

        $('#clearBtn').on('click', function() {
            game.clear();
            board.clear();
            isGameRunning = false;
            $status.html('Board Cleared');
        });

        // --- INITIALIZE BOARD ---
        var config = {
            draggable: true,
            dropOffBoard: 'trash',
            sparePieces: true,
            position: 'start',
            // THIS LINE LOADS THE PICTURES FROM THE INTERNET:
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: function() { board.position(game.fen()); }
        };
        board = Chessboard('myBoard', config);
    </script>
</body>
</html>
